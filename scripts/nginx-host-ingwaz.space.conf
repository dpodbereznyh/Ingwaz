# Хостовый nginx (VPS): TLS, www → apex, статика Ingwaz thesis-site.
# Document root: /var/www/ingwaz/public (содержимое frontend/dist после deploy).
# Симлинк: sites-enabled/ingwaz.space.conf
# sudo nginx -t && sudo systemctl reload nginx
# Сертификат: certbot -d ingwaz.space -d www.ingwaz.space

# HTTP → HTTPS apex
server {
    listen 80;
    listen [::]:80;
    server_name ingwaz.space www.ingwaz.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ingwaz.space$request_uri;
    }
}

# HTTPS www → apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.ingwaz.space;

    ssl_certificate /etc/letsencrypt/live/ingwaz.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ingwaz.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ingwaz.space$request_uri;
}

# HTTPS apex — static SPA
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ingwaz.space;

    ssl_certificate /etc/letsencrypt/live/ingwaz.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ingwaz.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/ingwaz/public;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Канон без завершающего слэша (как у compsnap/seobrief)
    rewrite ^/(.*)/$ /$1 permanent;

    # Без $uri/ — иначе редирект privacy ↔ privacy/ (301 loop) на путях с prerender.
    # Неизвестные URL → 404 (рекомендация Вебмастера), не fallback на главную.
    location / {
        error_page 404 /404.html;
        try_files $uri $uri/index.html =404;
    }

    location = /404.html {
        internal;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
